<div class="card" [class.highlighted]="isHighlighted()">
  <h3>{{ product().name }}</h3>
  <p>{{ product().description }}</p>
  <span class="price">{{ product().price | currency }}</span>
  <div class="actions">
    <button type="button" (click)="onAddToCart()">Add to Cart</button>
    <button type="button" (click)="onViewDetails()">View Details</button>
  </div>
</div>
